name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on:
  workflow_dispatch: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version:
  workflow_dispatch: 8.0.x

      - name: Configure GitHub Packages
        run: dotnet nuget add source --username Binoui --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Binoui/index.json"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --verbosity minimal
